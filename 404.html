<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Arivalan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .page-404 h1 {
      font-family: 'Sora', sans-serif;
      font-size: 6rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .page-404 p {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .page-404 a {
      display: inline-flex;
      align-items: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      background: var(--gradient);
      padding: 0.7rem 1.8rem;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .page-404 a:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(108,92,231,0.35);
    }
  </style>
</head>
<body>
  <div class="page-404">
    <div>
      <h1>404</h1>
      <p>This page wandered off. Maybe it's overthinking somewhere.</p>
      <a href="/">← Back Home</a>
    </div>
  </div>
</body>
</html>
